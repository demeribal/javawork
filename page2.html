<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>상품정보</li>
                <li>플레이버</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="menu">
                <div class="menu-info">
                    <div class="menu-img">
                        <img src="images/corn_rotation.png" width="77.24px"height="100%">
                        <img src="images/cup_rotation.png" width="93.01px" height="100%"style="margin-top: 20px">
                    </div>
                    <div class="menu-txt">
                        <div>싱글레귤러</div>
                        <div>(콘/컵)</div>
                    </div>
                    <div class="menu-price">\3,200</div>
                </div>
                <div class="menu-info-txt">
                    <p>원하는 맛의 아이스크림을 싱글레귤러로 즐기세요!</p>
                </div>

            </div>
            <div class="option-container">
                <p class="option-info">★★ 본 제품은 포장이 불가합니다 ★★</p>
                <div class="option">
                    <div class="option-item">
                        <div class="option-item-box">
                            <img src="images/cup.png">
                            <p class="option-name">컵(포장불가)</p>
                            <p>- 0 +</p>
                        </div>
                    </div>
                    <div class="option-item">
                        <div class="option-item-box">
                            <img src="images/corn.png">
                            <p class="option-name">콘(포장불가)</p>
                            <p>- 0 +</p>
                        </div>
                    </div>
                    <div class="option-item">
                        <div class="option-item-box">
                            <img src="images/corn.png">
                            <p class="option-name">와플콘(포장불가)</p>
                            <p>- 0 +</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="none"></div>
        </div>
    </main>
    
    <footer>
        <button>이전</button>
        <button>담기</button>
    </footer>
</body>
</html>
